name: Hisoka CI

on:
  push:
    branches: ["main", "release/campaign"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - name: Prettier format check
        run: pnpm run format:check

  circuits:
    name: Circuits (Noir)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nargo
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          export PATH="$HOME/.nargo/bin:$PATH"
          noirup -v 1.0.0-beta.22
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
      - name: Check circuit formatting
        working-directory: packages/circuits
        run: nargo fmt --check
      - name: Test circuits
        working-directory: packages/circuits
        run: nargo test
      - name: Circuit regression guards
        run: bash scripts/circuit-guards.sh
      - name: FROST forged-scalar harness
        working-directory: packages/prover/test-harness/frost-forgery
        run: |
          ./check-byte-identity.sh
          nargo test

  ts-tests:
    name: TS Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install Nargo
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          export PATH="$HOME/.nargo/bin:$PATH"
          noirup -v 1.0.0-beta.22
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
      - run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm turbo run build --filter=@hisoka/wallets --filter=@hisoka/adaptors --filter=@hisoka/prover
      - name: Test wallets
        run: pnpm --filter @hisoka/wallets run test
      - name: Test adaptors
        run: pnpm --filter @hisoka/adaptors run test
      - name: Test prover
        run: pnpm --filter @hisoka/prover run test

  kage-native-gate:
    name: Kage native VK-pin gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install Nargo
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          export PATH="$HOME/.nargo/bin:$PATH"
          noirup -v 1.0.0-beta.22
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
      - name: Install native bb 5.0.0
        run: |
          curl -L https://raw.githubusercontent.com/AztecProtocol/aztec-packages/master/barretenberg/bbup/install | bash
          export PATH="$HOME/.bb:$PATH"
          bbup -v 5.0.0
          echo "$HOME/.bb" >> $GITHUB_PATH
      - run: pnpm install --frozen-lockfile
      - name: Build prover
        run: pnpm turbo run build --filter=@hisoka/wallets --filter=@hisoka/prover
      - name: Run gate (must execute, never skip)
        run: |
          test -x "$HOME/.bb/bb" || { echo "::error::native bb not installed at ~/.bb/bb"; exit 1; }
          "$HOME/.bb/bb" --version | grep -q '5.0.0' || { echo "::error::native bb is not 5.0.0"; exit 1; }
          rc=0
          out="$(KAGE_NATIVE=1 pnpm --filter @hisoka/prover run test:native 2>&1)" || rc=$?
          echo "$out"
          echo "$out" | grep -q 'skipping (not passing)' && { echo "::error::Kage native gate SKIPPED"; exit 1; }
          echo "$out" | grep -q 'opt-in only' && { echo "::error::gate did not receive KAGE_NATIVE=1"; exit 1; }
          echo "$out" | grep -qE '1 passed' || { echo "::error::gate did not report a passing assertion"; exit 1; }
          exit "$rc"
      - name: FROST forgery accept-path control (must execute, never skip)
        run: |
          test -x "$HOME/.bb/bb" || { echo "::error::native bb not installed at ~/.bb/bb"; exit 1; }
          "$HOME/.bb/bb" --version | grep -q '5.0.0' || { echo "::error::native bb is not 5.0.0"; exit 1; }
          # `out=$(cmd)` under bash -e aborts at the assignment when cmd fails, so a separate `rc=$?` line
          # would never run. Capture the status in the same command instead.
          rc=0
          out="$(packages/prover/test-harness/frost-forgery/run-gold-standard.sh 2>&1)" || rc=$?
          echo "$out"
          test "$rc" -eq 0 || { echo "::error::accept control exited $rc"; exit 1; }
          echo "$out" | grep -q 'Proof verified successfully' || { echo "::error::bb never reported a verified proof; the accept control did not run"; exit 1; }
          echo "$out" | grep -q 'produced a VERIFYING proof' || { echo "::error::accept control did not reach its success assertion"; exit 1; }

  evm-tests:
    name: EVM Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install Nargo
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          export PATH="$HOME/.nargo/bin:$PATH"
          noirup -v 1.0.0-beta.22
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
      - run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: pnpm turbo run build
      - name: Typecheck deploy/ops scripts and hardhat config
        run: pnpm --filter evm-contracts run typecheck:scripts
      - name: Run Solidity tests
        run: pnpm --filter evm-contracts run test:fast
      - name: Run slow Solidity tests
        run: pnpm --filter evm-contracts run test:slow
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Run invariant tests (Foundry)
        run: pnpm --filter evm-contracts run test:invariant
      - name: Validate upgrade safety
        run: pnpm --filter evm-contracts run validate:upgrades
      - name: Check storage-layout snapshots
        run: pnpm --filter evm-contracts run storage:check

  security:
    name: Secrets + Deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan (Trufflehog)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown --exclude-paths=.trufflehog-ignore-paths
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Dependency audit (prod deps, high severity)
        run: pnpm audit --prod --audit-level high || true

