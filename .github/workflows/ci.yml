name: Hisoka CI

on:
  push:
    branches: ["main", "release/campaign"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - name: Prettier format check
        run: pnpm run format:check

  circuits:
    name: Circuits (Noir)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nargo
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          export PATH="$HOME/.nargo/bin:$PATH"
          noirup -v 1.0.0-beta.22
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
      - name: Check circuit formatting
        working-directory: packages/circuits
        run: nargo fmt --check
      - name: Test circuits
        working-directory: packages/circuits
        run: nargo test
      - name: Circuit regression guards
        run: bash scripts/circuit-guards.sh

  ts-tests:
    name: TS Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install Nargo
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          export PATH="$HOME/.nargo/bin:$PATH"
          noirup -v 1.0.0-beta.22
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
      - run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm turbo run build --filter=@hisoka/wallets --filter=@hisoka/adaptors --filter=@hisoka/prover
      - name: Test wallets
        run: pnpm --filter @hisoka/wallets run test
      - name: Test adaptors
        run: pnpm --filter @hisoka/adaptors run test
      - name: Test prover
        run: pnpm --filter @hisoka/prover run test

  kage-native-gate:
    name: Kage native VK-pin gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install Nargo
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          export PATH="$HOME/.nargo/bin:$PATH"
          noirup -v 1.0.0-beta.22
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
      - name: Install native bb 5.0.0
        run: |
          curl -L https://raw.githubusercontent.com/AztecProtocol/aztec-packages/master/barretenberg/bbup/install | bash
          export PATH="$HOME/.bb:$PATH"
          bbup -v 5.0.0
          echo "$HOME/.bb" >> $GITHUB_PATH
      - run: pnpm install --frozen-lockfile
      # generate_verifier (native bb) + compile_circuit (nargo) run in the prover build.
      - name: Build prover
        run: pnpm turbo run build --filter=@hisoka/wallets --filter=@hisoka/prover
      # The gate self-skips (green) when native bb is absent or KAGE_NATIVE is unset. This step forces it to
      # RUN: it fails loudly if native bb is missing, if the gate skips for any reason, or if it does not report
      # a passing assertion. A missing gate must never read as a green build.
      - name: Run gate (must execute, never skip)
        run: |
          test -x "$HOME/.bb/bb" || { echo "::error::native bb not installed at ~/.bb/bb"; exit 1; }
          "$HOME/.bb/bb" --version | grep -q '5.0.0' || { echo "::error::native bb is not 5.0.0"; exit 1; }
          out="$(KAGE_NATIVE=1 pnpm --filter @hisoka/prover run test:native 2>&1)"; rc=$?
          echo "$out"
          echo "$out" | grep -q 'skipping (not passing)' && { echo "::error::Kage native gate SKIPPED"; exit 1; }
          echo "$out" | grep -q 'opt-in only' && { echo "::error::gate did not receive KAGE_NATIVE=1"; exit 1; }
          echo "$out" | grep -qE '1 passed' || { echo "::error::gate did not report a passing assertion"; exit 1; }
          exit $rc

  evm-tests:
    name: EVM Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install Nargo
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          export PATH="$HOME/.nargo/bin:$PATH"
          noirup -v 1.0.0-beta.22
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
      - run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: pnpm turbo run build
      - name: Run Solidity tests
        run: pnpm --filter evm-contracts run test:fast
      # Proof-heavy tests excluded from the parallel fast suite (RootEviction root-history window).
      - name: Run slow Solidity tests
        run: pnpm --filter evm-contracts run test:slow
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Run invariant tests (Foundry)
        run: pnpm --filter evm-contracts run test:invariant
      # Upgrade-safety gate: validates the 3 UUPS impls (storage layout via DarkPoolV1 reference,
      # library-link pin, banned-flag and annotation scans). Fails the job on any drift.
      - name: Validate upgrade safety
        run: pnpm --filter evm-contracts run validate:upgrades
      # Storage-layout tripwire: regenerates the committed snapshots and diffs them. The
      # .storage-layout/*.json snapshots and linked-libraries.json MUST be committed for this to
      # arm (an empty/absent snapshot makes the diff pass vacuously). Those snapshots are
      # empty-by-design (all state is in ERC-7201 namespaces); they only catch a NEW bare
      # sequential slot. The load-bearing upgrade gate is validate:upgrades above (validateUpgrade
      # against DarkPoolV1), backed by the DarkPoolV1 storage-surface guard (scripts/regen-darkpoolv1.ts).
      - name: Check storage-layout snapshots
        run: pnpm --filter evm-contracts run storage:check

  security:
    name: Secrets + Deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan (Trufflehog)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown --exclude-paths=.trufflehog-ignore-paths
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Dependency audit (prod deps, high severity)
        # Advisory only: the npm audit endpoint pnpm uses was retired, so this cannot gate reliably.
        run: pnpm audit --prod --audit-level high || true

  # Rust CI (lint, test, security) runs in hisoka-io/nox repo
