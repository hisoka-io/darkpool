# Foundry is used ONLY for stateful invariant fuzzing of the money paths (DarkPool ledger/nullifier/memo
# invariants and MerkleTreeLib root retention). Hardhat remains the primary toolchain for unit/integration/e2e.
# The generated verifiers are skipped because the invariants drive DarkPool behind StubVerifier, so the ~30k-line
# UltraHonk contracts would only cost compile time.
[profile.default]
src = "contracts"
out = "foundry-out"
test = "test/invariant"
cache_path = "foundry-cache"
libs = ["node_modules"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
skip = [
  "contracts/verifiers/**",
  "contracts/DarkPoolV1.sol",
  "contracts/adaptors/**",
  "contracts/nox/**",
  "contracts/governance/**",
  "contracts/compliance/**",
]
remappings = [
  "@openzeppelin/=node_modules/@openzeppelin/",
  "@uniswap/=node_modules/@uniswap/",
]

[invariant]
runs = 64
depth = 32
fail_on_revert = false
