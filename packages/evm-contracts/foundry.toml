# Foundry is used ONLY for stateful invariant fuzzing of the money-adjacent libraries (MerkleTreeLib root
# retention). Hardhat remains the primary toolchain for unit/integration/e2e. Heavy generated verifiers and the
# proxy contracts are skipped so forge compiles only what the invariants reach.
[profile.default]
src = "contracts"
out = "foundry-out"
test = "test/invariant"
cache_path = "foundry-cache"
libs = ["node_modules"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
skip = [
  "contracts/verifiers/**",
  "contracts/DarkPool.sol",
  "contracts/DarkPoolV1.sol",
  "contracts/adaptors/**",
  "contracts/nox/**",
  "contracts/governance/**",
  "contracts/compliance/**",
  "contracts/mocks/**",
]
remappings = [
  "@openzeppelin/=node_modules/@openzeppelin/",
  "@uniswap/=node_modules/@uniswap/",
]

[invariant]
runs = 64
depth = 32
fail_on_revert = false
